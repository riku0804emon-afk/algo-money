<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-bg:#FAFBFE;--color-surface:#FFFFFF;--color-surface-alt:#F3F5FA;
  --color-primary:#2563EB;--color-primary-light:#DBEAFE;--color-primary-dark:#1D4ED8;
  --color-text:#0F172A;--color-text-secondary:#475569;--color-text-tertiary:#94A3B8;
  --color-border:#E2E8F0;
  --radius-md:12px;--radius-lg:16px;
  --shadow-md:0 4px 12px rgba(0,0,0,0.06);--shadow-lg:0 12px 40px rgba(0,0,0,0.08);
  --font-sans:'Noto Sans JP','Plus Jakarta Sans',system-ui,sans-serif;
  --font-display:'Plus Jakarta Sans','Noto Sans JP',sans-serif;
  --transition-fast:0.2s cubic-bezier(0.4,0,0.2,1);--transition-smooth:0.4s cubic-bezier(0.16,1,0.3,1);
  --max-w:1120px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,251,254,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border);height:64px}
.nav-inner{max-width:var(--max-w);margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:100%}
.nav-logo{font-family:var(--font-display);font-weight:800;font-size:20px;display:flex;align-items:center;gap:8px}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--color-primary)}
.nav-logo span{color:var(--color-primary)}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-links a{font-size:14px;font-weight:500;color:var(--color-text-secondary);padding:8px 14px;border-radius:8px;transition:all var(--transition-fast)}
.nav-links a:hover{color:var(--color-primary);background:var(--color-primary-light)}

.page-header{max-width:var(--max-w);margin:0 auto;padding:100px 24px 40px;text-align:center}
.page-header h1{font-family:var(--font-display);font-size:32px;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px}
.page-header p{color:var(--color-text-secondary);font-size:16px}

.filter-bar{max-width:var(--max-w);margin:0 auto 32px;padding:0 24px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.filter-btn{font-family:var(--font-sans);font-size:13px;font-weight:600;padding:8px 20px;border-radius:100px;color:var(--color-text-secondary);background:var(--color-surface);border:1.5px solid var(--color-border);cursor:pointer;transition:all var(--transition-fast)}
.filter-btn:hover{border-color:var(--color-primary);color:var(--color-primary)}
.filter-btn.active{color:#fff;background:var(--color-primary);border-color:var(--color-primary)}

.articles-grid{max-width:var(--max-w);margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.article-card{background:var(--color-surface);border:1.5px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;transition:all var(--transition-smooth)}
.article-card:hover{border-color:var(--color-primary);box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.article-thumb{height:160px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.article-cat{position:absolute;top:12px;left:12px;font-size:11px;font-weight:700;color:var(--color-primary);background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);padding:4px 12px;border-radius:100px}
.article-body{padding:20px}
.article-title{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--color-text-tertiary)}
.article-read{font-weight:600;color:var(--color-primary);display:flex;align-items:center;gap:4px}

.no-results{text-align:center;padding:60px 24px;color:var(--color-text-tertiary);font-size:15px}

.footer{background:var(--color-text);color:rgba(255,255,255,0.6);padding:40px 24px;text-align:center}
.footer-logo{font-family:var(--font-display);font-size:18px;font-weight:800;color:#fff;margin-bottom:8px}
.footer-logo span{color:var(--color-primary)}
.footer p{font-size:12px}

@media(max-width:768px){
  .articles-grid{grid-template-columns:1fr}
  .nav-links{display:none}
  .page-header h1{font-size:24px}
}
@media(max-width:1024px){
  .articles-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="dot"></span>alogo<span>-money</span>.dev</a>
    <div class="nav-links">
      <a href="index.html#ranking">ランキング</a>
      <a href="index.html#howto">始め方</a>
      <a href="articles.html">記事一覧</a>
      <a href="index.html#faq">FAQ</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>記事一覧</h1>
  <p>副業・在宅ワークに関するお役立ち記事をまとめています</p>
</div>

<div class="filter-bar" id="filterBar"></div>

<div class="articles-grid" id="articlesGrid">
  <div class="no-results">記事を読み込み中...</div>
</div>

<footer class="footer">
  <div class="footer-logo">alogo<span>-money</span>.dev</div>
  <p>© 2026 alogo-money.dev All rights reserved.</p>
  <p style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:8px">当サイトはアフィリエイトプログラムに参加しています。</p>
</footer>

<script>
const emojis = {
  "レビュー": "⭐", "ノウハウ": "💡", "ガイド": "📘", "税金・法律": "📊",
  "比較": "⚖️", "体験談": "💬", "ランキング": "🏆", "コラム": "📝"
};
const colors = {
  "レビュー": "#DBEAFE,#F3E8FF", "ノウハウ": "#D1FAE5,#DBEAFE", "ガイド": "#DBEAFE,#CFFAFE",
  "税金・法律": "#FEF3C7,#DBEAFE", "比較": "#F3E8FF,#FCE7F3", "体験談": "#D1FAE5,#FEF3C7",
  "ランキング": "#FEF3C7,#FCE7F3", "コラム": "#F1F5F9,#DBEAFE"
};

let allArticles = [];

async function loadArticles() {
  try {
    const res = await fetch('articles/index.json');
    allArticles = await res.json();
    buildFilters();
    renderArticles('all');
  } catch (e) {
    document.getElementById('articlesGrid').innerHTML =
      '<div class="no-results">記事の読み込みに失敗しました</div>';
  }
}

function buildFilters() {
  const cats = [...new Set(allArticles.map(a => a.category).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  let html = '<button class="filter-btn active" onclick="filterArticles(\'all\',this)">すべて</button>';
  cats.forEach(c => {
    html += `<button class="filter-btn" onclick="filterArticles('${c}',this)">${c}</button>`;
  });
  bar.innerHTML = html;
}

function filterArticles(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles(cat);
}

function renderArticles(cat) {
  const grid = document.getElementById('articlesGrid');
  const filtered = cat === 'all' ? allArticles : allArticles.filter(a => a.category === cat);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">該当する記事がありません</div>';
    return;
  }

  grid.innerHTML = filtered.map(a => {
    const emoji = emojis[a.category] || '📝';
    const color = colors[a.category] || '#DBEAFE,#F3E8FF';
    return `<a href="${a.url}" class="article-card">
      <div class="article-thumb" style="background:linear-gradient(135deg,${color})">
        ${emoji}
        <div class="article-cat">${a.category || ''}</div>
      </div>
      <div class="article-body">
        <div class="article-title">${a.title}</div>
        <div class="article-meta">
          <span>${a.date || ''}</span>
          <span class="article-read">読む →</span>
        </div>
      </div>
    </a>`;
  }).join('');
}

loadArticles();
</script>
</body>
</html>
